apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ai-gateway-frontend:k8s
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: "http://localhost:30080"
