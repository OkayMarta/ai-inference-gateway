apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: ai-gateway-task-service:k8s
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: TASK_DB_NAME
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: DB_SSLMODE
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: REDIS_ADDR
            - name: REDIS_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: REDIS_DB
            - name: CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: CACHE_TTL_SECONDS
            - name: BILLING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: BILLING_SERVICE_URL
            - name: OLLAMA_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: OLLAMA_URL
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: ai-gateway-config
                  key: FRONTEND_ORIGIN
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secret
                  key: INTERNAL_SERVICE_TOKEN
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
