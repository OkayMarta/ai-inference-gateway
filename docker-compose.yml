services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ai_gateway_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    ports:
      - "6379:6379"

  billing-migrations:
    image: postgres:16-alpine
    container_name: ai-gateway-billing-migrations
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./services/billing-service/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'set -e;
      for file in $$(find /migrations -maxdepth 1 -name '*.sql' | sort); do
        echo "applying $$file";
        psql -h postgres -U postgres -d billing_db -v ON_ERROR_STOP=1 -f "$$file";
      done'

  task-migrations:
    image: postgres:16-alpine
    container_name: ai-gateway-task-migrations
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./services/task-service/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'set -e;
      for file in $$(find /migrations -maxdepth 1 -name '*.sql' | sort); do
        echo "applying $$file";
        psql -h postgres -U postgres -d task_db -v ON_ERROR_STOP=1 -f "$$file";
      done'

  billing-service:
    build:
      context: ./services/billing-service
    container_name: ai-gateway-billing-service
    environment:
      PORT: "8081"
      INTERNAL_SERVICE_TOKEN: dev-internal-secret
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: billing_db
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8081:8081"
    depends_on:
      billing-migrations:
        condition: service_completed_successfully

  task-service:
    build:
      context: ./services/task-service
    container_name: ai-gateway-task-service
    environment:
      PORT: "8082"
      INTERNAL_SERVICE_TOKEN: dev-internal-secret
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: task_db
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      CACHE_TTL_SECONDS: "60"
      BILLING_SERVICE_URL: http://billing-service:8081
      OLLAMA_URL: http://host.docker.internal:11434
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8082:8082"
    depends_on:
      task-migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
      billing-service:
        condition: service_started

  gateway-service:
    build:
      context: ./services/gateway-service
    container_name: ai-gateway-gateway-service
    environment:
      PORT: "8080"
      JWT_SECRET: dev-secret
      INTERNAL_SERVICE_TOKEN: dev-internal-secret
      BILLING_SERVICE_URL: http://billing-service:8081
      TASK_SERVICE_URL: http://task-service:8082
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      billing-service:
        condition: service_started
      task-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: ai-gateway-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - gateway-service

volumes:
  ai_gateway_postgres_data:
    name: ai_gateway_postgres_data
